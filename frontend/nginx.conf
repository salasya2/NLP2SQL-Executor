server {
    listen 80;
    
    # Serve the static React files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Essential for React Router
    }

    # Proxy all /api requests to the backend service
    location /api/ {
        # 'backend-service' is the exact name of the Service in your k8s-backend.yaml
        proxy_pass http://backend-service:5000/api/;
        
        # Websocket support (crucial for your voice ws endpoint!)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
